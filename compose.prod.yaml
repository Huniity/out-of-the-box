services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ops/backend/Dockerfile.prod
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
    volumes:
      - django_logs:/app/logs
      - static_files:/app/staticfiles  # shared with nginx
      - media_files:/app/staticfiles/media  # user uploads, shared with nginx
      - ./scripts:/scripts
    expose:
      - "8000"  # internal only, nginx proxies
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro  # serve Django static + frontend dist
      - media_files:/app/staticfiles/media:ro  # serve user uploads
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  django_logs:
  static_files:
  media_files: