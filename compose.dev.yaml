services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: ops/backend/Dockerfile.dev
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
    env_file: .env
    volumes:
      - ./srcs/backend:/app
      - django_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    image: node:25-alpine
    working_dir: /app
    volumes:
      - ./srcs/frontend:/app
      - /app/node_modules
      - frontend_logs:/app/logs
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 2>&1 | tee /app/logs/vite.log"
    depends_on:
      - backend
    environment:
    - CHOKIDAR_USEPOLLING=true
    - WATCHPACK_POLLING=true

volumes:
  postgres_data:
  django_logs:
  frontend_logs: