name: Nightly Infra Update & Test

on:
  schedule:
    - cron: '0 3 * * *' # Roda todas as noites às 3h
  push:
    branches: [ pedro/infra ] # Ajustado sem o prefixo 'origin/' para o GitHub Actions reconhecer
  workflow_dispatch: # Permite o disparo manual na interface do GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Força o uso do Node 24 para evitar avisos de depreciação

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    # --- 1. VALIDAÇÃO DO TERRAFORM ---
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init & Validate
      run: |
        cd infrastructure/terraform
        terraform init -backend=false
        terraform validate

    # --- 2. TESTES DA APLICAÇÃO (CONTAINER TEMPORÁRIO) ---
    - name: Setup Docker
      uses: docker/setup-buildx-action@v3

    - name: Create Temporary .env for Tests
      run: make env

    # Executa o Pytest num container isolado que se auto-destrói (--rm) assim que termina
    - name: Run Backend Tests (Pytest - Isolated)
      run: docker compose -f compose.dev.yaml run --rm backend pytest

  deploy:
    needs: test-and-validate
    runs-on: ubuntu-latest
    
    # Injeção de Secrets diretamente como variáveis de ambiente para o teu Terraform local
    env:
      TF_VAR_server_ip: ${{ secrets.VM_HOST }}
      TF_VAR_ssh_user: ${{ secrets.VM_USER }}
      TF_VAR_ssh_key_path: /home/runner/.ssh/id_rsa
      TF_CLI_ARGS_apply: "-auto-approve" # Injeta o auto-approve para não travar o Makefile

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    # --- 3. CONFIGURAÇÃO SSH ---
    - name: Setup SSH Key & Agent for Terraform
      run: |
        mkdir -p ~/.ssh
        
        # 1. Guarda a chave privada limpa
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # 2. Configura as regras de bypass do Host
        echo "Host ${{ secrets.VM_HOST }}" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        echo "  UserKnownHostsFile=/dev/null" >> ~/.ssh/config
        
        # 3. LIGA O SSH AGENT E ADICIONA A CHAVE (O segredo que faltava!)
        # Usamos o >> $GITHUB_ENV para que o agente fique ativo nos passos seguintes
        ssh-agent -s > ~/.ssh/agent.env
        source ~/.ssh/agent.env
        ssh-add ~/.ssh/id_rsa
        
        # Exporta as variáveis do agente para o GitHub Actions segurar nos próximos steps
        echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
        echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

    # --- 4. INSTALAR O TERRAFORM NO RUNNER ---
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # --- 5. EXECUTAR DEPLOY FORÇANDO AS VARIÁVEIS DAS SECRETS ---
    - name: Deploy Infrastructure via Makefile
      run: |
        make infra-init
        make infra-apply
      env:
        TF_VAR_server_ip: ${{ secrets.VM_HOST }}
        TF_VAR_ssh_user: ${{ secrets.VM_USER }}
        TF_VAR_ssh_key_path: /home/runner/.ssh/id_rsa
